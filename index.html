<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แนะนำตัว - เมย์</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #ffd6e8, #ffe9c7);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        width: 350px;
    }

    .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: #ff90b3;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 42px;
        margin: auto;
    }

    h1 {
        color: #ff4f8b;
        margin-top: 20px;
    }

    p {
        color: #666;
        line-height: 1.6;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #ff4f8b;
        color: white;
        text-decoration: none;
        border-radius: 10px;
    }

    .btn:hover {
        background: #e83b78;
    }
</style>
</head>

<body>

<div class="card">
    <div class="avatar">M</div>

    <h1>สวัสดี ฉันชื่อ เมย์ 🌷</h1>

    <p>
        ยินดีที่ได้รู้จักนะ<br>
        นี่คือเว็บไซต์แนะนำตัวของฉัน<br>
        ชอบเรียนรู้สิ่งใหม่ ๆ และสนใจงานสร้างสรรค์ ✨
    </p>

    <a href="#" class="btn">ติดต่อฉัน</a>
</div>

</body>
</html>
